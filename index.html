<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        .navbar a:hover {
            text-decoration: underline;
        }

        .hero {
            text-align: center;
            color: white;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            font-size: 18px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 20px;
            background: #fff;
            color: #333;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        .btn:hover {
            background: #ddd;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" data-testid="nav-home">Home</a>
    <a href="signup.html" data-testid="nav-signup">Signup</a>
    <a href="login.html" data-testid="nav-login">Login</a>
</div>

<div class="hero">
    <h1 data-testid="home-title">Automation Practice App</h1>
    <p>Use this app to practice Playwright automation</p>
    <button class="btn" onclick="location.href='signup.html'" data-testid="start-btn">Get Started</button>
</div>

<div class="card-container">
    <div class="card">
        <h3>Signup</h3>
        <p>Create account with multiple fields  <a href="signup.html" data-testid="nav-signup">Signup</a></p>
    </div>
    <div class="card">
        <h3>Login</h3>
        <p>Validate credentials and navigation <a href="login.html" data-testid="nav-login">Login</a></p>
    </div>
    <div class="card">
        <h3>Dashboard</h3>
        <p>Verify login success flow <a href="login.html" data-testid="nav-login">Login</a></p>
    </div>
</div>

</body>
</html>
